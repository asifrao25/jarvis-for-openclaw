<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JARVIS">
  <meta name="theme-color" content="#000000">
  <title>JARVIS</title>
  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="apple-touch-icon" href="/pwa/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/pwa/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/pwa/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/pwa/icons/apple-touch-icon.png">
  
  <!-- iOS Splash Screens (Placeholder - images need to be generated) -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/pwa/icons/apple-touch-icon.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/pwa/icons/apple-touch-icon.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/pwa/icons/apple-touch-icon.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/pwa/icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pwa/design-tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { 
      height: 100vh; 
      height: -webkit-fill-available;
      width: 100vw;
      overflow: hidden; 
      background: #000;
    }
    body {
      margin: 0; padding: 0;
      color: #00FFFF;
      font-family: 'Rajdhani', sans-serif;
      user-select: none; -webkit-user-select: none;
      overscroll-behavior: none;
    }
  </style>
</head>
<body>
  <app-shell></app-shell>
  <script type="module" src="/main.js"></script>
</body>
</html>
